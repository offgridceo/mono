<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONO // Tecuani</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="profile-section">
            <div class="pfp-wrapper">
                <img src="assets/profile.jpg" alt="Tecuani" class="profile-pic">
            </div>
            <h1 class="artist-name">TECUANI</h1>
        </header>

        <main>
            <section class="player-container id="player">
                <div class="player-track-info">
                    <img src="" alt="Cover Art" id="player-cover" class="player-cover-art">
                    <div class="player-text">
                        <div id="player-title" class="player-title">Select a track</div>
                        <div class="player-artist">Tecuani</div>
                    </div>
                </div>
                <div class="player-controls">
                    <button id="play-btn" class="control-btn">▶</button>
                    <div class="progress-wrapper">
                        <span id="current-time">0:00</span>
                        <input type="range" id="progress-bar" value="0" max="100">
                        <span id="duration">0:00</span>
                    </div>
                </div>
                <audio id="audio-element"></audio>
            </section>

            <section class="content-section">
                <h2 class="section-title">Popular Releases</h2>
                <div id="tracks-list" class="tracks-list">
                    </div>
            </section>

            <section class="content-section">
                <h2 class="section-title">About</h2>
                <div class="about-box">
                    <p>Independent artist, producer, and architect of sound. MONO is the official, uncompromised archive for my discography—direct from the studio, bypassing external streaming politics.</p>
                </div>
            </section>

            <section class="support-section">
                <a href="https://buymeacoffee.com/yourlink" target="_blank" class="support-btn">
                    Support My Music
                </a>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
